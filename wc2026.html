let picks=JSON.parse(localStorage.getItem("wc26v5")||"{}");
let curTab="all",curPos="ALL",curC=null;

function myt(d,u){const[y,mo,dd]=d.split("-").map(Number);const[h,mi]=u.split(":").map(Number);return new Date(Date.UTC(y,mo-1,dd,h,mi)).toLocaleTimeString("en-MY",{hour:"2-digit",minute:"2-digit",timeZone:"Asia/Kuala_Lumpur"})+" MYT"}
function fmtD(ds){const[y,m,d]=ds.split("-").map(Number);return new Date(y,m-1,d).toLocaleDateString("en-MY",{weekday:"short",day:"numeric",month:"short"})}
function isToday(ds){return ds===new Date().toISOString().split("T")[0]}
function getAR(m){if(m.st!=="FT")return null;return m.hs>m.as?"home":m.hs<m.as?"away":"draw"}

function renderAll(tab){
  curTab=tab;
  const today=new Date().toISOString().split("T")[0];
  let list=M;
  if(tab==="today")list=M.filter(m=>m.date===today);
  else if(tab==="upcoming")list=M.filter(m=>m.st==="UPCOMING"||m.st==="LIVE");
  else if(tab==="results")list=M.filter(m=>m.st==="FT");
  else if(tab==="picks")list=M.filter(m=>picks[m.id]);
  const byD={};list.forEach(m=>{(byD[m.date]=byD[m.date]||[]).push(m)});
  const el=document.getElementById("ml");
  if(!Object.keys(byD).length){el.innerHTML='<div class="empty">No matches here yet.</div>';updStats();return;}
  el.innerHTML=Object.keys(byD).sort().map(dt=>{
    const b=isToday(dt)?'<span class="tbadge">TODAY</span>':"";
    return`<div class="dh">${fmtD(dt)} ${b}</div>`+byD[dt].map(mkCard).join("");
  }).join("");
  updStats();
}

function mkCard(m){
  const p=picks[m.id],ar=getAR(m),ok=p&&ar?p===ar:null;
  const sep=m.hs!==null?"–":"vs",hsD=m.hs!==null?m.hs:"",asD=m.as!==null?m.as:"";
  let sp="";
  if(m.st==="FT")sp='<span class="sp ft">FT</span>';
  else if(m.st==="LIVE")sp='<span class="sp live">LIVE</span>';
  else sp=`<span class="sp up">${myt(m.date,m.utc)}</span>`;
  const ut=m.upset&&m.st==="FT"?'<span class="utag">UPSET</span>':"";
  const cc=m.st==="LIVE"?"card livec":m.st==="FT"?(m.upset?"card done upsetc":"card done"):"card";
  const hLbl=m.hw>=14?`${m.hw}%`:"",dLbl=m.dw>=11?`${m.dw}%`:"",aLbl=m.aw>=14?`${m.aw}%`:"";
  const pH=p==="home"?"pbb selh":"pbb",pD=p==="draw"?"pbb seld":"pbb",pA=p==="away"?"pbb sela":"pbb";
  const hn=m.home.split(" ")[0],an=m.away.split(" ")[0];
  let rb="";
  if(p&&ar)rb=`<span class="rbdg ${ok?"rc":"rw"}">${ok?"✓ Correct":"✗ Wrong"}</span>`;
  else if(p){const pl=p==="home"?m.home:p==="away"?m.away:"Draw";rb=`<span class="rbdg rp">Pick: ${pl}</span>`;}
  const hid=m.id+"h",aid=m.id+"a";
  return`<div class="${cc}" id="c${m.id}">
<div class="ct"><span class="cg">Group ${m.grp}</span>${ut}<span class="cv">📍${m.venue}</span><span class="ctime ${m.st==="LIVE"?"livet":""}">${m.st==="FT"?"Full Time":m.st==="LIVE"?"● LIVE":myt(m.date,m.utc)}</span></div>
<div class="tr">
  <div class="team" onclick="openC(${hid})" title="Tap to view ${m.home} squad">
    <div class="flagw"><span class="tf">${m.hf}</span></div>
    <div><div class="tn">${m.home}</div><span class="taphint">👤 squad & map</span></div>
  </div>
  <div class="sb2"><div class="sc">${hsD} ${sep} ${asD}</div>${sp}</div>
  <div class="team away" onclick="openC(${aid})" title="Tap to view ${m.away} squad">
    <div><div class="tn">${m.away}</div><span class="taphint">👤 squad & map</span></div>
    <div class="flagw"><span class="tf">${m.af}</span></div>
  </div>
</div>
<div class="prow">
  <div class="plr"><span class="${p==="home"?"hl":""}">${m.home}</span><span>Win Probability (Bookie Implied)</span><span class="${p==="away"?"hl":""}">${m.away}</span></div>
  <div class="pbar"><div class="phb" style="width:${m.hw}%">${hLbl}</div><div class="pdb" style="width:${m.dw}%">${dLbl}</div><div class="pab" style="width:${m.aw}%">${aLbl}</div></div>
  <div class="pteams"><span class="phl">${m.hw}% Win</span><span class="pdl">${m.dw}% Draw</span><span class="pal">${m.aw}% Win</span></div>
</div>
<div class="pp">
  <div class="pks"><div class="pl">Your Pick</div><div class="pbr"><button class="${pH}" onclick="setPick(${m.id},'home')">${hn}</button><button class="${pD}" onclick="setPick(${m.id},'draw')">Draw</button><button class="${pA}" onclick="setPick(${m.id},'away')">${an}</button></div>${rb?`<div style="margin-top:5px">${rb}</div>`:""}</div>
  <div class="ris"><div class="pl">Analysis — <span class="sugg">${m.sugg}</span></div><div class="at">${m.note}</div></div>
</div></div>`;
}

const ID2NAME={};
M.forEach(m=>{ID2NAME[m.id+"h"]=m.home;ID2NAME[m.id+"a"]=m.away;});
function openC(id){
  const name=ID2NAME[id];
  if(!name)return;
  const c=getCData(name);
  if(!c){toast("No data for "+name);return;}
  curC=name;curPos="ALL";
  document.getElementById("mFlag").textContent=c.f;
  document.getElementById("mName").textContent=name;
  document.getElementById("mhtitle").textContent=name+" — Country Profile";
  document.getElementById("mTags").innerHTML=[
    `<span class="mtag">🏙 ${c.cap}</span>`,
    `<span class="mtag">🌍 ${c.conf}</span>`,
    `<span class="mtag">🏅 FIFA #${c.rank}</span>`,
    `<span class="mtag">🌐 ${c.wc}× WCup</span>`,
    `<span class="mtag">🏆 ${c.best}</span>`,
    `<span class="mtag">👨‍💼 ${c.coach}</span>`
  ].join("");
  document.getElementById("mapF").innerHTML=`<iframe loading="lazy" src="https://www.openstreetmap.org/export/embed.html?bbox=${c.lng-20},${c.lat-13},${c.lng+20},${c.lat+13}&layer=mapnik&marker=${c.lat},${c.lng}" style="width:100%;height:100%;border:none" allowfullscreen></iframe>`;
  const stars=c.p.filter(x=>x.s).length;
  const avgA=(c.p.reduce((a,x)=>a+x.a,0)/c.p.length).toFixed(0);
  const maxC=Math.max(...c.p.map(x=>x.caps||0));
  document.getElementById("cStats").innerHTML=`
<div class="cst"><div class="csn">#${c.rank}</div><div class="csl">FIFA Rank</div></div>
<div class="cst"><div class="csn">${c.wc}</div><div class="csl">WC Appearances</div></div>
<div class="cst"><div class="csn">${avgA}</div><div class="csl">Avg Age</div></div>
<div class="cst"><div class="csn">${c.p.length}</div><div class="csl">Players Listed</div></div>
<div class="cst"><div class="csn">${stars}⭐</div><div class="csl">Key Stars</div></div>
<div class="cst"><div class="csn">${maxC}</div><div class="csl">Top Caps</div></div>`;
  document.querySelectorAll(".pfb").forEach(b=>b.classList.remove("pfa"));
  document.querySelector(".pfb").classList.add("pfa");
  renderPlayers(c,"ALL");
  document.getElementById("mbg").classList.add("open");
  document.body.style.overflow="hidden";
}

function renderPlayers(c,pos){
  const pc={GK:"posGK",DF:"posDF",MF:"posMF",FW:"posFW"};
  const list=pos==="ALL"?c.p:c.p.filter(x=>x.pos===pos);
  document.getElementById("pgrid").innerHTML=list.length?list.map(x=>`
<div class="pc ${x.s?"star":""}">
  ${x.s?'<span class="stic">⭐</span>':""}
  <span class="ppos ${pc[x.pos]||""}">${x.pos}</span>
  <div class="pname">${x.n}</div>
  <div class="pclub">${x.cl}</div>
  <div class="page">Age ${x.a}${x.caps?" · "+x.caps+" caps":""}</div>
</div>`).join(""):'<div style="color:var(--textm);font-size:12px;padding:8px">None listed.</div>';
}

function fpos(pos,btn){
  curPos=pos;
  document.querySelectorAll(".pfb").forEach(b=>b.classList.remove("pfa"));
  btn.classList.add("pfa");
  const c=getCData(curC);
  if(c)renderPlayers(c,pos);
}

function closeBG(e){if(e.target===document.getElementById("mbg"))closeM()}
function closeM(){document.getElementById("mbg").classList.remove("open");document.body.style.overflow=""}

function setPick(id,pick){
  const m=M.find(x=>x.id===id);if(!m)return;
  if(picks[id]===pick)delete picks[id];else picks[id]=pick;
  localStorage.setItem("wc26v5",JSON.stringify(picks));
  renderAll(curTab);
  const pl=pick==="home"?m.home:pick==="away"?m.away:"Draw";
  toast(picks[id]?"Pick: "+pl:"Pick cleared");
}
function updStats(){
  const done=M.filter(m=>m.st==="FT").length;
  const np=Object.keys(picks).length;
  let cor=0;
  M.filter(m=>m.st==="FT"&&picks[m.id]).forEach(m=>{if(picks[m.id]===getAR(m))cor++;});
  const rated=M.filter(m=>m.st==="FT"&&picks[m.id]).length;
  document.getElementById("sDone").textContent=done;
  document.getElementById("sPicks").textContent=np;
  document.getElementById("sCor").textContent=cor;
  document.getElementById("sRate").textContent=rated?Math.round(cor/rated*100)+"%":"—";
}
function swTab(tab,btn){document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));btn.classList.add("active");renderAll(tab)}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200)}
async function doRefresh(){
  const btn=document.getElementById("rbtn");btn.classList.add("spin");btn.disabled=true;
  document.getElementById("lo").classList.add("show");
  await new Promise(r=>setTimeout(r,1100));
  document.getElementById("lo").classList.remove("show");btn.classList.remove("spin");btn.disabled=false;
  const now=new Date().toLocaleTimeString("en-MY",{hour:"2-digit",minute:"2-digit",timeZone:"Asia/Kuala_Lumpur"});
  document.getElementById("lu").textContent="Updated "+now+" MYT";
  renderAll(curTab);toast("✓ Refreshed");
}
renderAll("all");
const _n=new Date().toLocaleTimeString("en-MY",{hour:"2-digit",minute:"2-digit",timeZone:"Asia/Kuala_Lumpur"});
document.getElementById("lu").textContent="Loaded "+_n+" MYT";
